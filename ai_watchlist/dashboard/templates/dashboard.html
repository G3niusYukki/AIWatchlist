<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Watchlist Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --strong-buy: #00c853;
            --buy: #64dd17;
            --hold: #ffc107;
            --sell: #ff5722;
            --strong-sell: #d50000;
        }
        
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
        }
        
        .navbar {
            background: rgba(0,0,0,0.3) !important;
            backdrop-filter: blur(10px);
        }
        
        .card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
        }
        
        .signal-badge {
            font-size: 0.75rem;
            padding: 0.35rem 0.65rem;
            border-radius: 50px;
        }
        
        .signal-STRONG-BUY { background: var(--strong-buy); color: #000; }
        .signal-BUY { background: var(--buy); color: #000; }
        .signal-HOLD { background: var(--hold); color: #000; }
        .signal-SELL { background: var(--sell); color: #fff; }
        .signal-STRONG-SELL { background: var(--strong-sell); color: #fff; }
        
        .score-bar {
            height: 8px;
            border-radius: 4px;
            background: linear-gradient(90deg, var(--strong-sell) 0%, var(--hold) 50%, var(--strong-buy) 100%);
            position: relative;
        }
        
        .score-indicator {
            width: 4px;
            height: 16px;
            background: #fff;
            border-radius: 2px;
            position: absolute;
            top: -4px;
            transform: translateX(-50%);
            box-shadow: 0 0 10px rgba(255,255,255,0.5);
        }
        
        .indicator-pill {
            font-size: 0.7rem;
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
            background: rgba(255,255,255,0.1);
        }
        
        .indicator-positive { color: var(--strong-buy); }
        .indicator-negative { color: var(--strong-sell); }
        
        .table-hover tbody tr:hover {
            background: rgba(255,255,255,0.1);
        }
        
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }
        
        .alert-toast {
            position: fixed;
            top: 80px;
            right: 20px;
            z-index: 1000;
            max-width: 350px;
        }
        
        .chart-container {
            position: relative;
            height: 300px;
        }
        
        #scoreDistribution {
            height: 200px;
        }
        
        .refresh-spin {
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">
                <i class="bi bi-graph-up-arrow"></i> AI Watchlist
            </a>
            <div class="d-flex align-items-center gap-3">
                <span class="badge bg-secondary" id="lastUpdate">Not updated</span>
                <button class="btn btn-outline-light btn-sm" onclick="refreshData()" id="refreshBtn">
                    <i class="bi bi-arrow-clockwise"></i> Refresh
                </button>
                <a href="/api/analyze" class="btn btn-outline-light btn-sm" target="_blank">
                    <i class="bi bi-download"></i> JSON
                </a>
            </div>
        </div>
    </nav>

    <div class="container-fluid py-4">
        <!-- Summary Cards -->
        <div class="row mb-4">
            <div class="col-md-2">
                <div class="card text-center">
                    <div class="card-body">
                        <h6 class="text-muted">Strong Buy</h6>
                        <h2 class="text-success" id="countStrongBuy">-</h2>
                    </div>
                </div>
            </div>
            <div class="col-md-2">
                <div class="card text-center">
                    <div class="card-body">
                        <h6 class="text-muted">Buy</h6>
                        <h2 class="text-success" id="countBuy">-</h2>
                    </div>
                </div>
            </div>
            <div class="col-md-2">
                <div class="card text-center">
                    <div class="card-body">
                        <h6 class="text-muted">Hold</h6>
                        <h2 class="text-warning" id="countHold">-</h2>
                    </div>
                </div>
            </div>
            <div class="col-md-2">
                <div class="card text-center">
                    <div class="card-body">
                        <h6 class="text-muted">Sell</h6>
                        <h2 class="text-danger" id="countSell">-</h2>
                    </div>
                </div>
            </div>
            <div class="col-md-2">
                <div class="card text-center">
                    <div class="card-body">
                        <h6 class="text-muted">Strong Sell</h6>
                        <h2 class="text-danger" id="countStrongSell">-</h2>
                    </div>
                </div>
            </div>
            <div class="col-md-2">
                <div class="card text-center">
                    <div class="card-body">
                        <h6 class="text-muted">Total</h6>
                        <h2 id="countTotal">20</h2>
                    </div>
                </div>
            </div>
        </div>

        <!-- Charts Row -->
        <div class="row mb-4">
            <div class="col-md-8">
                <div class="card">
                    <div class="card-header">
                        <i class="bi bi-bar-chart"></i> Score Distribution
                    </div>
                    <div class="card-body">
                        <canvas id="scoreChart"></canvas>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card">
                    <div class="card-header">
                        <i class="bi bi-pie-chart"></i> Signal Distribution
                    </div>
                    <div class="card-body">
                        <canvas id="signalChart"></canvas>
                    </div>
                </div>
            </div>
        </div>

        <!-- Main Table -->
        <div class="card">
            <div class="card-header d-flex justify-content-between align-items-center">
                <span><i class="bi bi-table"></i> Company Rankings</span>
                <input type="text" class="form-control form-control-sm w-auto" placeholder="Search..." id="searchInput" onkeyup="filterTable()">
            </div>
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-dark table-hover mb-0" id="companiesTable">
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>Ticker</th>
                                <th>Company</th>
                                <th>Score</th>
                                <th>Signal</th>
                                <th>SEC</th>
                                <th>Jobs</th>
                                <th>GitHub</th>
                                <th>Exec</th>
                                <th>Sent</th>
                                <th>Govt</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody">
                            <tr><td colspan="12" class="text-center py-4">Loading...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Detail Modal -->
    <div class="modal fade" id="detailModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content bg-dark">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalTitle">Company Details</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="modalBody">
                    Loading...
                </div>
            </div>
        </div>
    </div>

    <!-- Alert Toasts -->
    <div class="alert-toast" id="alertContainer"></div>

    <!-- Loading Overlay -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="text-center">
            <div class="spinner-border text-light mb-3" style="width: 3rem; height: 3rem;"></div>
            <div>Analyzing companies...</div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let scoresData = [];
        let scoreChart, signalChart;
        let ws;
        
        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            initCharts();
            connectWebSocket();
            refreshData();
        });
        
        function initCharts() {
            const scoreCtx = document.getElementById('scoreChart').getContext('2d');
            scoreChart = new Chart(scoreCtx, {
                type: 'bar',
                data: {
                    labels: [],
                    datasets: [{
                        label: 'Composite Score',
                        data: [],
                        backgroundColor: [],
                        borderWidth: 0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { 
                            grid: { color: 'rgba(255,255,255,0.1)' },
                            ticks: { color: '#fff' }
                        },
                        x: { 
                            grid: { display: false },
                            ticks: { color: '#fff' }
                        }
                    }
                }
            });
            
            const signalCtx = document.getElementById('signalChart').getContext('2d');
            signalChart = new Chart(signalCtx, {
                type: 'doughnut',
                data: {
                    labels: ['Strong Buy', 'Buy', 'Hold', 'Sell', 'Strong Sell'],
                    datasets: [{
                        data: [0, 0, 0, 0, 0],
                        backgroundColor: ['#00c853', '#64dd17', '#ffc107', '#ff5722', '#d50000']
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            position: 'bottom',
                            labels: { color: '#fff' }
                        }
                    }
                }
            });
        }
        
        function connectWebSocket() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            ws = new WebSocket(`${protocol}//${window.location.host}/ws`);
            
            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                if (data.type === 'alerts') {
                    showAlerts(data.alerts);
                } else if (data.type === 'scores') {
                    updateTable(data.scores);
                }
            };
            
            ws.onclose = () => {
                setTimeout(connectWebSocket, 5000);
            };
        }
        
        async function refreshData() {
            const btn = document.getElementById('refreshBtn');
            btn.innerHTML = '<i class="bi bi-arrow-clockwise refresh-spin"></i> Refreshing...';
            document.getElementById('loadingOverlay').style.display = 'flex';
            
            try {
                const response = await fetch('/api/analyze');
                const data = await response.json();
                
                scoresData = data.scores;
                updateSummary(data.summary);
                updateTable(data.scores);
                updateCharts(data.scores, data.summary);
                
                document.getElementById('lastUpdate').textContent = 
                    'Updated: ' + new Date().toLocaleTimeString();
            } catch (error) {
                console.error('Error fetching data:', error);
                showAlert({ message: 'Error fetching data: ' + error.message });
            } finally {
                btn.innerHTML = '<i class="bi bi-arrow-clockwise"></i> Refresh';
                document.getElementById('loadingOverlay').style.display = 'none';
            }
        }
        
        function updateSummary(summary) {
            document.getElementById('countStrongBuy').textContent = summary.strong_buy;
            document.getElementById('countBuy').textContent = summary.buy;
            document.getElementById('countHold').textContent = summary.hold;
            document.getElementById('countSell').textContent = summary.sell;
            document.getElementById('countStrongSell').textContent = summary.strong_sell;
            document.getElementById('countTotal').textContent = 
                summary.strong_buy + summary.buy + summary.hold + summary.sell + summary.strong_sell;
        }
        
        function updateTable(scores) {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = scores.map((score, i) => {
                const ind = score.indicators;
                return `
                    <tr>
                        <td>${i + 1}</td>
                        <td><strong>${score.ticker}</strong></td>
                        <td>${score.company_name}</td>
                        <td>
                            <div class="score-bar">
                                <div class="score-indicator" style="left: ${((score.composite_score + 3) / 6) * 100}%"></div>
                            </div>
                            <small>${score.composite_score.toFixed(2)}</small>
                        </td>
                        <td><span class="signal-badge signal-${score.signal.replace(' ', '-')}">${score.signal}</span></td>
                        <td><span class="indicator-pill ${ind.sec_filings.z_score >= 0 ? 'indicator-positive' : 'indicator-negative'}">${ind.sec_filings.z_score.toFixed(2)}</span></td>
                        <td><span class="indicator-pill ${ind.job_postings.z_score >= 0 ? 'indicator-positive' : 'indicator-negative'}">${ind.job_postings.z_score.toFixed(2)}</span></td>
                        <td><span class="indicator-pill ${ind.github_activity.z_score >= 0 ? 'indicator-positive' : 'indicator-negative'}">${ind.github_activity.z_score.toFixed(2)}</span></td>
                        <td><span class="indicator-pill ${ind.exec_appearances.z_score >= 0 ? 'indicator-positive' : 'indicator-negative'}">${ind.exec_appearances.z_score.toFixed(2)}</span></td>
                        <td><span class="indicator-pill ${ind.employee_sentiment.z_score >= 0 ? 'indicator-positive' : 'indicator-negative'}">${ind.employee_sentiment.z_score.toFixed(2)}</span></td>
                        <td><span class="indicator-pill ${ind.govt_contracts.z_score >= 0 ? 'indicator-positive' : 'indicator-negative'}">${ind.govt_contracts.z_score.toFixed(2)}</span></td>
                        <td>
                            <button class="btn btn-sm btn-outline-light" onclick="showDetail('${score.ticker}')">
                                <i class="bi bi-eye"></i>
                            </button>
                        </td>
                    </tr>
                `;
            }).join('');
        }
        
        function updateCharts(scores, summary) {
            scoreChart.data.labels = scores.map(s => s.ticker);
            scoreChart.data.datasets[0].data = scores.map(s => s.composite_score);
            scoreChart.data.datasets[0].backgroundColor = scores.map(s => {
                if (s.composite_score >= 2) return '#00c853';
                if (s.composite_score >= 1) return '#64dd17';
                if (s.composite_score >= -1) return '#ffc107';
                if (s.composite_score >= -2) return '#ff5722';
                return '#d50000';
            });
            scoreChart.update();
            
            signalChart.data.datasets[0].data = [
                summary.strong_buy,
                summary.buy,
                summary.hold,
                summary.sell,
                summary.strong_sell
            ];
            signalChart.update();
        }
        
        async function showDetail(ticker) {
            const modal = new bootstrap.Modal(document.getElementById('detailModal'));
            document.getElementById('modalTitle').textContent = ticker + ' Details';
            document.getElementById('modalBody').innerHTML = 'Loading...';
            modal.show();
            
            try {
                const [analyzeRes, priceRes, historyRes] = await Promise.all([
                    fetch(`/api/analyze/${ticker}`),
                    fetch(`/api/prices/${ticker}`),
                    fetch(`/api/history/${ticker}`)
                ]);
                
                const analyze = await analyzeRes.json();
                const price = await priceRes.json();
                const history = await historyRes.json();
                
                const score = analyze.score;
                const indicators = score.indicators;
                
                document.getElementById('modalBody').innerHTML = `
                    <div class="row">
                        <div class="col-md-6">
                            <h6>Score & Signal</h6>
                            <div class="mb-3">
                                <span class="signal-badge signal-${score.signal.replace(' ', '-')}" style="font-size: 1rem; padding: 0.5rem 1rem;">
                                    ${score.signal}
                                </span>
                                <span class="ms-3">Score: ${score.composite_score.toFixed(3)}</span>
                            </div>
                            
                            ${price.price ? `
                            <h6>Price Data</h6>
                            <table class="table table-sm">
                                <tr><td>Current</td><td>$${price.price.current_price.toFixed(2)}</td></tr>
                                <tr><td>Day Change</td><td class="${price.price.day_change >= 0 ? 'text-success' : 'text-danger'}">${price.price.day_change_pct.toFixed(2)}%</td></tr>
                                <tr><td>52W High</td><td>$${price.price.fifty_two_week_high.toFixed(2)}</td></tr>
                                <tr><td>52W Low</td><td>$${price.price.fifty_two_week_low.toFixed(2)}</td></tr>
                                <tr><td>Above 50DMA</td><td>${price.price.above_50dma ? '✓' : '✗'}</td></tr>
                                <tr><td>Above 200DMA</td><td>${price.price.above_200dma ? '✓' : '✗'}</td></tr>
                            </table>
                            ` : ''}
                        </div>
                        <div class="col-md-6">
                            <h6>Indicator Breakdown</h6>
                            <table class="table table-sm">
                                <tr><th>Indicator</th><th>Z-Score</th><th>Weight</th></tr>
                                <tr><td>SEC Filings</td><td class="${indicators.sec_filings.z_score >= 0 ? 'text-success' : 'text-danger'}">${indicators.sec_filings.z_score.toFixed(2)}</td><td>25%</td></tr>
                                <tr><td>Job Postings</td><td class="${indicators.job_postings.z_score >= 0 ? 'text-success' : 'text-danger'}">${indicators.job_postings.z_score.toFixed(2)}</td><td>15%</td></tr>
                                <tr><td>GitHub Activity</td><td class="${indicators.github_activity.z_score >= 0 ? 'text-success' : 'text-danger'}">${indicators.github_activity.z_score.toFixed(2)}</td><td>10%</td></tr>
                                <tr><td>Exec Appearances</td><td class="${indicators.exec_appearances.z_score >= 0 ? 'text-success' : 'text-danger'}">${indicators.exec_appearances.z_score.toFixed(2)}</td><td>15%</td></tr>
                                <tr><td>Employee Sentiment</td><td class="${indicators.employee_sentiment.z_score >= 0 ? 'text-success' : 'text-danger'}">${indicators.employee_sentiment.z_score.toFixed(2)}</td><td>10%</td></tr>
                                <tr><td>Govt Contracts</td><td class="${indicators.govt_contracts.z_score >= 0 ? 'text-success' : 'text-danger'}">${indicators.govt_contracts.z_score.toFixed(2)}</td><td>25%</td></tr>
                            </table>
                        </div>
                    </div>
                `;
            } catch (error) {
                document.getElementById('modalBody').innerHTML = '<div class="text-danger">Error loading details</div>';
            }
        }
        
        function filterTable() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const rows = document.querySelectorAll('#tableBody tr');
            rows.forEach(row => {
                const text = row.textContent.toLowerCase();
                row.style.display = text.includes(search) ? '' : 'none';
            });
        }
        
        function showAlerts(alerts) {
            const container = document.getElementById('alertContainer');
            alerts.forEach(alert => {
                const toast = document.createElement('div');
                toast.className = 'toast show bg-dark border mb-2';
                toast.innerHTML = `
                    <div class="toast-header bg-dark text-light">
                        <strong class="me-auto">${alert.ticker}</strong>
                        <small>${alert.alert_type}</small>
                    </div>
                    <div class="toast-body">${alert.message}</div>
                `;
                container.appendChild(toast);
                setTimeout(() => toast.remove(), 5000);
            });
        }
        
        function showAlert(alert) {
            showAlerts([alert]);
        }
    </script>
</body>
</html>
